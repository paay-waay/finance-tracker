<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <title>Finance Tracker · V3.3.1 Formula Inputs</title>
    <link rel="manifest" href="./manifest.json" />
    <link rel="apple-touch-icon" href="./apple-touch-icon.png" />
    <meta name="theme-color" content="#111111" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Finance Tracker" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div class="topbar-main">
          <div class="title-row">
            <h1 id="pageTitle">Monitor</h1>
            <span id="headerStatus" class="header-status-pill safe">Safe</span>
          </div>
          <div class="topbar-controls">
            <label class="month-field month-chip">
              <span>Month</span>
              <input id="monthInput" type="month" />
            </label>
            <div class="scope-switch" role="tablist" aria-label="Monitor scope">
              <button id="scopeWeekButton" class="scope-button is-active" type="button" data-scope="week">Week</button>
              <button id="scopeMonthButton" class="scope-button" type="button" data-scope="month">Month</button>
            </div>
          </div>
        </div>
      </header>

      <main id="app" class="app-main"></main>

      <nav id="bottomNav" class="bottom-nav" aria-label="Primary"></nav>
    </div>

    <div id="modalRoot"></div>

    <template id="toastTemplate">
      <div class="toast" role="status"></div>
    </template>

    <script src="./app.js"></script>
    <script>
      if ("serviceWorker" in navigator && location.protocol !== "file:") {
        window.addEventListener("load", () => {
          navigator.serviceWorker.register("./sw.js").catch(() => {});
        });
      }
    </script>
  </body>
</html>
